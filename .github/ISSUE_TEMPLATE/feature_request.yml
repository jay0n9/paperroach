name: Feature request
description: Propose a focused improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility or migration impact
      description: Explain effects on notes, configuration, stores, and existing workflows.
    validations:
      required: true
